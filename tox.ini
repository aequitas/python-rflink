[tox]
envlist = py39,py310,py311,py312,lint,typing
skip_missing_interpreters = True

[gh-actions]
python =
    3.9: py39
    3.10: py310
    3.11: py311, lint
    3.12: py312

[testenv]
commands = py.test \
           --doctest-modules \
           --cov=rflink \
           --cov=rflinkproxy \
           rflink tests {posargs}
deps =
  pytest
  pytest-cov
  pytest-xdist
usedevelop = True

[testenv:fix]
commands =
	autopep8 --aggressive --in-place --recursive .
	isort .
	black .
deps =
  isort
  black
  autopep8

[testenv:lint]
commands =
	pylama setup.py rflink rflinkproxy tests
	black --check .
deps =
  isort
  pylama
  black
  pydocstyle<6
  pyflakes<2.5

[testenv:typing]
commands = mypy --install-types --non-interactive --strict --follow-untyped-imports --ignore-missing-imports rflink
#commands = basedpyright rflink
deps =
  types-docopt
  mypy

[testenv:pypy3]
deps =
  {[testenv]deps}
  asyncio
